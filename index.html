<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f7f5f0">
    <title>找乐子的千山</title>
    <meta name="description" content="找乐子的千山，分享作品与生活里的小小乐子。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="找乐子的千山首页">
        <span class="brand-mark" role="img" aria-label="找乐子的千山头像">山</span>
        <span>找乐子的千山</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="works.html">作品</a>
        <a href="notes.html">随记</a>
        <a href="about.html">关于</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy" data-home-copy>
          <p class="eyebrow">找乐子的人</p>
          <h1>找乐子的千山</h1>
          <p class="lead">工作那么累，为什么不在生活中找点乐子放松下。</p>
          <p class="intro">这里收放一些作品、日常观察和微小的开心瞬间。认真生活，也认真给自己留一点喘气的空间。</p>
          <div class="hero-actions" aria-label="快捷入口">
            <a class="button primary" href="works.html">看看作品</a>
            <a class="button" href="notes.html">读点随记</a>
            <a class="button ghost" href="about.html">认识一下</a>
          </div>
        </div>
        <div class="hero-panel" aria-label="生活片段">
          <div class="panel-topline">
            <span>今日小乐子</span>
            <span>三件</span>
          </div>
          <div class="moment-stack" data-home-moments>
            <span>路过一家很会晒太阳的咖啡店</span>
            <span>把麻烦事拆成一个能完成的小动作</span>
            <span>在普通日子里捡到一点轻松</span>
          </div>
        </div>
      </section>

      <section class="section-grid">
        <div class="section-heading">
          <p class="eyebrow">作品</p>
          <h2>最近想摆出来的东西</h2>
        </div>
        <div class="cards three" data-works-preview aria-live="polite">
          <article class="work-card state-card">
            <div class="visual visual-empty"></div>
            <div class="card-meta">
              <span>加载中</span>
            </div>
            <h3>正在读取作品</h3>
            <p>稍等一下，正在取最新内容。</p>
          </article>
        </div>
      </section>

      <section class="split-section">
        <div>
          <p class="eyebrow">随记</p>
          <h2>一些还在路上的记录</h2>
          <p class="section-copy">随记会慢慢补上。先把空间留给生活里的小发现。</p>
        </div>
        <div class="note-list" data-notes-preview aria-live="polite">
          <article class="note-card">
            <div>
              <time>加载中</time>
              <h3>正在读取随记</h3>
              <p>稍等一下，正在取最新内容。</p>
            </div>
          </article>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <span>找乐子的千山</span>
      <span>在生活中找点乐子。</span>
    </footer>
    <script src="site-data.js"></script>
  </body>
</html>
